"$schema" = 'https://starship.rs/config-schema.json'

format = '''
[](red)\
$os\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:green bg:sapphire)\
$conda\
$docker_context\
[](fg:sapphire bg:lavender)\
$time\
[ ](fg:lavender)\
$cmd_duration\
$line_break\
$character'''

palette = 'synthpunk_pastel_dark'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Alpaquita = " "
Alpine = " "
Amazon = " "
Android = " "
Arch = " "
Artix = " "
CentOS = " "
Debian = " "
Dragonfly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Gentoo = " "
HardenedBSD = " "
Illumos = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
OpenBSD = " "
OpenCloudOS = " "
openEuler = " "
openSUSE = " "
OracleLinux = " "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
Redox = " "
Solus = " "
SUSE = " "
Ubuntu = " "
Unknown = " "
Windows = " "

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = "[ $user]($style)"

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
Documents = "󰈙 "
Downloads = " "
Music = "󰝚 "
Pictures = " "
Developer = "󰲋 "

[git_branch]
symbol = ""
style = "bg:yellow"
format = "[[ $symbol $branch ](fg:crust bg:yellow)]($style)"

[git_status]
style = "bg:yellow"
format = "[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)"

[c]
style = "bg:green"
format = "[[  ( $version) ](fg:crust bg:green)]($style)"

[rust]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[golang]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[nodejs]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[bun]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[php]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[java]
style = "bg:green"
format = "[[  ( $version) ](fg:crust bg:green)]($style)"

[kotlin]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[haskell]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[python]
style = "bg:green"
format = "[[ ( $version) ](fg:crust bg:green)]($style)"

[docker_context]
symbol = ""
style = "bg:sapphire"
format = "[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)"

[conda]
symbol = "  "
style = "fg:crust bg:sapphire"
format = "[$symbol$environment ]($style)"
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = "[[  $time ](fg:crust bg:lavender)]($style)"

[line_break]
disabled = true

[character]
disabled = false
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"
vimcmd_replace_one_symbol = "[❮](bold fg:lavender)"
vimcmd_replace_symbol = "[❮](bold fg:lavender)"
vimcmd_visual_symbol = "[❮](bold fg:yellow)"

[cmd_duration]
show_milliseconds = true
format = "  in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

