fg_color = "#6B4F5E"

[colors.tab_bar.new_tab]
bg_color = "#FFF0EB"
fg_color = "#6B4F5E"

ansi = ["#2E1A24", "#FF516E", "#3EA27C", "#B68A1C", "#6989FF", "#FF4A91", "#219FAC", "#6B4F5E"]

brights = ["#6B4F5E", "#FF1037", "#3DA27D", "#B68A1C", "#3C66FF", "#FF3182", "#219FAC", "#2E1A24"]
