# Synthpunk Pastel Light

[colors]
foreground = "#2E1A24"
background = "#FFF8F5"
cursor_bg = "#C49BFF"
cursor_fg = "#FFF8F5"
cursor_border = "#C49BFF"
selection_fg = "#2E1A24"
selection_bg = "rgba(94, 212, 224, 0.3)"
scrollbar_thumb = "#6B4F5E"
